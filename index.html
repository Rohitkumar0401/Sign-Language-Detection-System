<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="container mx-auto px-4 py-10 flex flex-col items-center">
        <h1 class="text-4xl font-bold mb-8 text-blue-400">Sign Language AI</h1>

        <div class="relative bg-black rounded-lg overflow-hidden border-4 border-gray-700 w-full max-w-2xl aspect-video">
            <video id="videoFeed" autoplay playsinline class="w-full h-full object-cover"></video>
            <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
        </div>

        <div class="mt-8 flex gap-4">
            <button id="startBtn" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-full font-semibold transition">Start Scanning</button>
            <button id="stopBtn" class="bg-red-600 hover:bg-red-500 px-6 py-2 rounded-full font-semibold transition">Stop</button>
        </div>

        <div class="mt-10 w-full max-w-2xl bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h2 class="text-sm uppercase tracking-widest text-gray-400 mb-2">Prediction</h2>
            <div id="textOutput" class="text-3xl font-mono text-yellow-400 min-h-[3rem]">Waiting for input...</div>
            
            <div class="mt-6 flex items-center justify-between border-t border-gray-700 pt-4">
                <button id="voiceBtn" class="flex items-center gap-2 text-blue-400 hover:text-blue-300">
                    <span>🔊 Play Voice</span>
                </button>
                <span class="text-xs text-gray-500">CNN + RNN Model Active</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
